services:
  bot:
    build:
      context: ../apps/bot
      dockerfile: Dockerfile
    env_file:
      - path: ../.env
        required: false
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - /run/secrets/google_service_account.json:/run/secrets/google_service_account.json:ro
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    env_file:
      - path: ../.env
        required: false
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
